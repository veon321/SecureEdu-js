<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="menu-container" id="menu-container">
      <div class="user admin" data-role="admin">Admin</div>
      <div class="user teacher" data-role="teacher">Teacher</div>
      <div class="user student" data-role="student">Student</div>
      <div class="user guest" data-role="guest">Guest</div>
    </div>
    <div class="panel admin hidden" id="admin-panel">
      <div class="user-list" id="user-list"></div>
      <div class="add-user-panel" id="add-user-panel">
        Dodaj użytkownika
        <label
          >Nazwa użytkownika: <input type="text" class="name" id="name" />
        </label>
        <div class="select-role">
          <span>Wybierz rolę:</span>
          <select class="role" id="user-role"></select>
        </div>
        <button type="button" id="addUser-button" class="addUser-button">
          Add User
        </button>
      </div>
    </div>
    <div class="panel teacher hidden" id="teacher-panel">
      <div class="uczniowie" id="uczniowie"></div>
    </div>
    <div class="panel student hidden" id="student-panel">fsadf3</div>
    <div class="panel guest hidden" id="guest-panel">fsadf4</div>
  </body>
  <script src="script.js"></script>
</html>
